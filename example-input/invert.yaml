alphabet:
    terms: [1, 0, "#"]
    non_terms: []
    blank: "#"

states: [S, F, Fwd, Ret]
initial_state: S
halt_state: F

tape_init: example-input//tape.txt

transitions:
    S:
        "*": [_, Fwd, _]
    Fwd:
        1: [0, _, r]
        0: [1, _, r]
        "#": [_, Ret, l]
    Ret:
        "#": [_, F, r]
        1: [_, _, l]
        0: [_, _, l]